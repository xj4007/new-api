version: "3.4"

services:
  redis:
    image: redis:8-alpine
    container_name: ${REDIS_CONTAINER_NAME:-new-api-redis}
    restart: always
    env_file:
      - .env
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./data:/data
    networks:
      new-api-infra:
        aliases:
          - new-api-redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
    # Uncomment only when app nodes on other hosts must access Redis.
    # Restrict access with a private network or security group.
    # ports:
    #   - "${REDIS_BIND_HOST:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"

networks:
  new-api-infra:
    external: true
    name: new-api-infra
